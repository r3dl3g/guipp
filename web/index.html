<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Gui++ @PROJECT_NAME@</title>
    <style>
        body { 
            margin: 0; 
            background: #111; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        canvas { 
            border: 1px solid #444; 
            margin-top: 20px; 
            background: #000;
        }
    </style>
</head>
<body>

    <h2>Gui++ @PROJECT_NAME@</h2>

    <canvas id="canvas2d" width="1600" height="720"></canvas>

    <script>
        const canvas = document.getElementById('canvas2d');
        const b = canvas.getBoundingClientRect();
        const rect = {x: b.x, y: b.y, width: b.width, height: b.height};

        // 1. Offscreen-Kontrolle übernehmen
        const offscreen = canvas.transferControlToOffscreen();

        // 2. Worker erstellen
        const worker = new Worker('@PROJECT_NAME@-worker.js');

        function resizeCanvas() {
            canvas.width = window.innerWidth - 20;
            canvas.height = window.innerHeight - 20;

            console.log("Canvas resize: " + canvas.width + ", " + canvas.height);
            
            // Redraw content (we'll implement this next)  
            worker.postMessage({
                type: 11,
                x: canvas.width,
                y: canvas.height
            });
        }

        function calc_state (e) {
            return (e.ctrlKey ? 0x10 : 0) | (e.shiftKey ? 0x20 : 0) | (e.altKey ? 0x40 : 0) | (e.metaKey ? 0x80 : 0);
        };

        // 3. Initialisierung an den Worker senden
        worker.postMessage({
            type: 'init',
            canvas: offscreen,
            rect: rect
        }, [offscreen]);

        // Event-Listener für Klicks auf dem Canvas
        canvas.addEventListener('mousedown', (e) => {
            const b = canvas.getBoundingClientRect();
            worker.postMessage({
                type: 20 + e.button,
                x: e.clientX - b.x,
                y: e.clientY - b.y,
                state: calc_state(e)
            });
        });

        canvas.addEventListener('mouseup', (e) => {
            const b = canvas.getBoundingClientRect();
            worker.postMessage({
                type: 30 + e.button,
                x: e.clientX - b.x,
                y: e.clientY - b.y,
                state: calc_state(e)
            });
        });

        canvas.addEventListener('mousemove', (e) => {
            const b = canvas.getBoundingClientRect();
            worker.postMessage({
                type: 19,
                x: e.clientX - b.x,
                y: e.clientY - b.y,
                state: calc_state(e) | (e.buttons ? 0x01 << (e.buttons - 1) : 0)
            });
        });

        canvas.addEventListener('dblclick', (e) => {
            const b = canvas.getBoundingClientRect();
            worker.postMessage({
                type: 40 + e.button,
                x: e.clientX - b.x,
                y: e.clientY - b.y,
                state: calc_state(e)
            });
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const b = canvas.getBoundingClientRect();
            if (e.deltaX) {
                worker.postMessage({
                    type: 16,
                    x: e.clientX - b.x,
                    y: e.clientY - b.y,
                    state: e.deltaX
                });
            }
            if (e.deltaY) {
                worker.postMessage({
                    type: 17,
                    x: e.clientX - b.x,
                    y: e.clientY - b.y,
                    state: e.deltaY
                });
            }
            if (e.deltaZ) {
                worker.postMessage({
                    type: 18,
                    x: e.clientX - b.x,
                    y: e.clientY - b.y,
                    state: e.deltaZ
                });
            }
        });

        canvas.addEventListener('mouseenter', (e) => {
            worker.postMessage({ type: 14 });
        });

        canvas.addEventListener('mouseleave', (e) => {
            worker.postMessage({ type: 15 });
        });

        window.addEventListener('resize', resizeCanvas);

        // Optional: Auch Tastatur-Events weiterleiten
        window.addEventListener('keydown', (e) => {
            e.preventDefault();
            let chars = e.key.length > 1 ? e.chars : e.key;
            let state = calc_state(e);
            if (e.key == "+" && e.code == "Equal") {
                state = state & 0xD0;
            }
            worker.postMessage({
                type: 12,
                key: e.key,
                state: state,
                chars: chars
            });
        });

        window.addEventListener('keyup', (e) => {
            e.preventDefault();
            let chars = e.key.length > 1 ? e.chars : e.key;
            let state = calc_state(e);
            if (e.key == "+" && e.code == "Equal") {
                state = state & 0xD0;
            }
            worker.postMessage({
                type: 13,
                key: e.key,
                state: state,
                chars: chars
            });
        });

        // Die Rückleitung empfangen
        worker.onmessage = function(e) {
            const data = e.data;

            //console.log("Main-Thread hat Post vom C++ Worker:", data);

            if (data.type === "cursor") {
                canvas.style.cursor = data.payload;
            } else if (data.type === "copy") {
                navigator.clipboard.writeText(data.payload);
            } else if (data.type === "paste") {
                const id = data.payload;
                navigator.clipboard.readText().then((clipText) => {
                    worker.postMessage({
                        type: 50,
                        chars: clipText,
                        state: id
                    });
                });
            }
        };

</script>
</body>
</html>
